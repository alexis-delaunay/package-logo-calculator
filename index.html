<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSB Logo Rechner</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .main-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            gap: 30px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h1 { font-size: 24px; margin-top: 0; text-align: center; color: #00529b; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #00529b; box-shadow: 0 0 0 3px rgba(0,82,155,0.1); }
        .results {
            background: #fbfbfd;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.6;
            border-left: 4px solid #00529b;
        }
        .derivation { color: #86868b; font-size: 12px; display: block; margin-top: 2px; }
        
        #preview-container {
            width: 100%;
            height: 450px;
            background: #e5e5e5;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            padding: 40px;
            box-sizing: border-box;
        }

        /* Split-Screen Layout für Desktop */
        @media (min-width: 1000px) {
            .main-layout {
                flex-direction: row;
                align-items: flex-start;
                justify-content: center;
            }
            .container {
                flex: 0 0 400px;
            }
            #preview-container {
                flex: 1;
                height: 600px;
            }
        }
        #surface {
            background: white;
            border: 1px solid #999;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.2s ease-out;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        #logo-svg {
            width: 100%;
            height: auto;
        }
        .measure-label {
            position: absolute;
            font-size: 10px;
            color: #666;
        }
        .label-b { bottom: -20px; width: 100%; text-align: center; }
        .label-h { right: -40px; top: 50%; transform: translateY(-50%) rotate(90deg); white-space: nowrap; }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="container">
            <h1>KSB Logo Rechner</h1>
            
            <div class="input-group">
                <label for="width-b">Flächen-Breite (B) in cm</label>
                <input type="number" id="width-b" value="100" min="1" oninput="calculate()">
            </div>
            
            <div class="input-group">
                <label for="height-h">Flächen-Höhe (H) in cm</label>
                <input type="number" id="height-h" value="80" min="1" oninput="calculate()">
            </div>

            <div class="results" id="results">
                <!-- Ergebnisse erscheinen hier -->
            </div>
        </div>

        <div id="preview-container">
            <div id="surface">
                <div class="logo-wrapper" id="logo-container">
                    <img src="ksb-logo.png" id="logo-img" alt="KSB Logo" style="width: 100%; height: auto; display: block;">
                    <div id="logo-error" style="display:none; color: #d93025; font-size: 12px; text-align: center; padding: 10px; border: 1px dashed #d93025;">
                        Datei <b>ksb-logo.png</b> wurde nicht gefunden.<br>Bitte im gleichen Ordner ablegen.
                    </div>
                </div>
                <div class="measure-label label-b" id="display-b">100 cm</div>
                <div class="measure-label label-h" id="display-h">80 cm</div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const B = parseFloat(document.getElementById('width-b').value) || 0;
            const H = parseFloat(document.getElementById('height-h').value) || 0;
            const logoContainer = document.getElementById('logo-container');
            const logoImg = document.getElementById('logo-img');
            const logoError = document.getElementById('logo-error');
            const surface = document.getElementById('surface');
            const resultsDiv = document.getElementById('results');
            const displayB = document.getElementById('display-b');
            const displayH = document.getElementById('display-h');

            if (B <= 0 || H <= 0) return;

            // Fehler-Check für das Bild
            logoImg.onerror = function() {
                logoImg.style.display = 'none';
                logoError.style.display = 'block';
            };
            logoImg.onload = function() {
                logoImg.style.display = 'block';
                logoError.style.display = 'none';
            };

            // Berechnungslogik laut Vorgabe
            let logoWidth;
            let ruleText;
            if (B < H) {
                logoWidth = B * 0.7;
                ruleText = `${B} < ${H} (B < H) → LogoBreite = B x 0,7 = ${B} x 0,7`;
            } else {
                logoWidth = H * 0.7;
                ruleText = `${B} >= ${H} (B >= H) → LogoBreite = H x 0,7 = ${H} x 0,7`;
            }

            // Fläche berechnen (für Zusatzinfo)
            const area = (B * H) / 10000;

            // Ergebnisse anzeigen
            resultsDiv.innerHTML = `
                <div><strong>Fläche:</strong> ${area.toLocaleString('de-DE', {minimumFractionDigits: 2})} m² <span class="derivation">(Herleitung: ${B}cm x ${H}cm / 10.000)</span></div>
                <div style="margin-top:8px"><strong>Logo-Breite:</strong> ${logoWidth.toFixed(2)} cm</div>
                <span class="derivation">Herleitung: ${ruleText} = ${logoWidth.toFixed(2)} cm</span>
            `;

            // Beschriftung der Vorschau
            displayB.innerText = B + " cm";
            displayH.innerText = H + " cm";

            // Visualisierung skalieren
            const container = document.getElementById('preview-container');
            const maxW = container.clientWidth - 80;
            const maxH = container.clientHeight - 80;
            
            const ratio = Math.min(maxW / B, maxH / H);
            
            surface.style.width = (B * ratio) + 'px';
            surface.style.height = (H * ratio) + 'px';
            
            // Logo Breite relativ zur Flächen-Breite (B) setzen
            // logoWidth ist in cm, B ist in cm. Verhältnis = logoWidth / B
            const logoVisualWidthPercent = (logoWidth / B) * 100;
            logoContainer.style.width = logoVisualWidthPercent + '%';
        }

        // Initial beim Laden
        window.onload = calculate;
        window.onresize = calculate;
    </script>
</body>
</html>
