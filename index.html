<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karton Logo Rechner - Blueprint</title>
    <style>
        :root {
            --ksb-blue: #00529b;
            --bg-gray: #f0f2f5;
            --card-bg: #ffffff;
            --border-color: #d2d2d7;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            gap: 20px;
            box-sizing: border-box;
        }

        /* Sidebar / Input */
        .sidebar {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            align-self: flex-start;
        }

        h1 { font-size: 20px; color: var(--ksb-blue); margin: 0 0 20px 0; border-bottom: 1px solid var(--bg-gray); padding-bottom: 10px; }
        
        .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 4px; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            background: #fdfdfd;
        }
        input:focus { border-color: var(--ksb-blue); outline: none; box-shadow: 0 0 0 3px rgba(0,82,155,0.1); }

        .results {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid var(--ksb-blue);
        }
        .result-item { margin-bottom: 12px; }
        .result-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 2px; }
        .result-value { font-size: 16px; font-weight: 700; }
        .derivation { font-size: 10px; color: #999; font-style: italic; display: block; }

        /* Preview Area */
        .preview-pane {
            flex: 1;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            padding: 40px;
            min-height: 500px;
            box-sizing: border-box;
            position: relative;
            overflow: auto;
        }

        .view-header { font-weight: 600; color: var(--text-secondary); font-size: 12px; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 1px; }

        .surfaces-container {
            display: flex;
            gap: 60px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin: auto;
        }

        .surface-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .surface-title { font-size: 12px; font-weight: 700; color: var(--ksb-blue); background: #eef4f9; padding: 4px 12px; border-radius: 20px; }

        .surface {
            background: #fff;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
        }

        .logo-img { display: block; max-width: none; }

        /* Dimensions */
        .dim { position: absolute; font-size: 11px; color: #666; font-family: monospace; }
        .dim-w { bottom: -22px; width: 100%; text-align: center; border-top: 1px solid #ccc; padding-top: 4px; }
        .dim-h { right: -50px; height: 100%; display: flex; align-items: center; border-left: 1px solid #ccc; padding-left: 8px; }

        @media (min-width: 1000px) {
            .main-layout { flex-direction: row; align-items: stretch; height: calc(100vh - 40px); }
            .sidebar { width: 380px; flex-shrink: 0; }
            .preview-pane { height: 100%; }
        }

        @media (max-width: 600px) {
            .preview-pane { padding: 20px; }
            .surfaces-container { gap: 80px; }
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <!-- Eingabe -->
        <div class="sidebar">
            <h1>Logo Rechner</h1>
            
            <div class="input-row">
                <div class="input-group">
                    <label>Länge (L)</label>
                    <input type="number" id="in-l" value="400" oninput="draw()">
                </div>
                <div class="input-group">
                    <label>Breite (B)</label>
                    <input type="number" id="in-b" value="300" oninput="draw()">
                </div>
                <div class="input-group">
                    <label>Höhe (H)</label>
                    <input type="number" id="in-h" value="250" oninput="draw()">
                </div>
            </div>

            <div class="results">
                <div class="result-item">
                    <div class="result-label">Logo-Breite</div>
                    <div class="result-value" id="res-logo-w">0 mm</div>
                    <span class="derivation" id="res-logo-der"></span>
                </div>
                <div class="result-item">
                    <div class="result-label">Fläche B x H</div>
                    <div class="result-value" id="res-area-bh">0 dm²</div>
                    <span class="derivation" id="res-area-bh-der"></span>
                </div>
                <div class="result-item">
                    <div class="result-label">Fläche L x H</div>
                    <div class="result-value" id="res-area-lh">0 dm²</div>
                    <span class="derivation" id="res-area-lh-der"></span>
                </div>
            </div>
        </div>

        <!-- Vorschau -->
        <div class="preview-pane">
            <div class="view-header">Maßstabsgetreue Blueprint-Ansicht (mm)</div>
            
            <div class="surfaces-container">
                <!-- Fläche 1 -->
                <div class="surface-box">
                    <div class="surface-title">Seite B x H</div>
                    <div class="surface" id="surf-bh">
                        <img src="ksb-logo.png" id="logo1" class="logo-img">
                        <div class="dim dim-w" id="dim-bh-w">0 mm</div>
                        <div class="dim dim-h" id="dim-bh-h">0 mm</div>
                    </div>
                </div>

                <!-- Fläche 2 -->
                <div class="surface-box">
                    <div class="surface-title">Seite L x H</div>
                    <div class="surface" id="surf-lh">
                        <img src="ksb-logo.png" id="logo2" class="logo-img">
                        <div class="dim dim-w" id="dim-lh-w">0 mm</div>
                        <div class="dim dim-h" id="dim-lh-h">0 mm</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function draw() {
            const L = parseFloat(document.getElementById('in-l').value) || 0;
            const B = parseFloat(document.getElementById('in-b').value) || 0;
            const H = parseFloat(document.getElementById('in-h').value) || 0;

            if (L <= 0 || B <= 0 || H <= 0) return;

            // Berechnung Logo-Breite (Regel: B vs H)
            let logoW;
            let rule;
            if (B < H) {
                logoW = B * 0.7;
                rule = `B < H → ${B}mm * 0,7`;
            } else {
                logoW = H * 0.7;
                rule = `B >= H → ${H}mm * 0,7`;
            }

            // UI Update Texte
            document.getElementById('res-logo-w').innerText = logoW.toFixed(1) + " mm";
            document.getElementById('res-logo-der').innerText = `Herleitung: ${rule} = ${logoW.toFixed(1)}mm`;
            
            const aBH = (B * H) / 10000;
            const aLH = (L * H) / 10000;
            document.getElementById('res-area-bh').innerText = aBH.toLocaleString('de-DE', {minimumFractionDigits:2}) + " dm²";
            document.getElementById('res-area-bh-der').innerText = `Herleitung: ${B} * ${H} mm²`;
            document.getElementById('res-area-lh').innerText = aLH.toLocaleString('de-DE', {minimumFractionDigits:2}) + " dm²";
            document.getElementById('res-area-lh-der').innerText = `Herleitung: ${L} * ${H} mm²`;

            // Dimensionen Beschriftung
            document.getElementById('dim-bh-w').innerText = B + " mm";
            document.getElementById('dim-bh-h').innerText = H + " mm";
            document.getElementById('dim-lh-w').innerText = L + " mm";
            document.getElementById('dim-lh-h').innerText = H + " mm";

            // Scaling Logic
            const pane = document.querySelector('.preview-pane');
            const availW = pane.clientWidth - 200; // Abzug für Paddings/Abstände
            const availH = pane.clientHeight - 200;
            
            // Gesamtbreite beider Boxen + Gap (60px)
            const totalModelW = B + L + 60;
            const totalModelH = H;
            
            const ratio = Math.min(availW / totalModelW, availH / totalModelH);

            // Flächen anpassen
            const sBH = document.getElementById('surf-bh');
            const sLH = document.getElementById('surf-lh');
            sBH.style.width = (B * ratio) + 'px';
            sBH.style.height = (H * ratio) + 'px';
            sLH.style.width = (L * ratio) + 'px';
            sLH.style.height = (H * ratio) + 'px';

            // Logo anpassen
            const visualLogoW = logoW * ratio;
            document.getElementById('logo1').style.width = visualLogoW + 'px';
            document.getElementById('logo2').style.width = visualLogoW + 'px';

            // Warnung wenn Logo > Fläche L
            sLH.style.borderColor = (logoW > L) ? "#d93025" : "#333";
            sLH.style.boxShadow = (logoW > L) ? "10px 10px 0px rgba(217,48,37,0.1)" : "10px 10px 0px rgba(0,0,0,0.05)";
        }

        window.onload = draw;
        window.onresize = draw;
    </script>
</body>
</html>
