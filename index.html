<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karton Logo Rechner - Blueprint</title>
    <style>
        :root {
            --ksb-blue: #00529b;
            --bg-gray: #f0f2f5;
            --card-bg: #ffffff;
            --border-color: #d2d2d7;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            gap: 20px;
            box-sizing: border-box;
        }

        /* Sidebar / Input */
        .sidebar {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            align-self: flex-start;
        }

        h1 { font-size: 20px; color: var(--ksb-blue); margin: 0 0 10px 0; border-bottom: 1px solid var(--bg-gray); padding-bottom: 10px; }
        .section-hint { font-size: 13px; color: var(--text-secondary); margin-bottom: 15px; font-weight: 500; display: flex; justify-content: space-between; align-items: center; }
        .swap-note { font-size: 10px; color: #f2994a; font-weight: 600; display: none; }
        
        .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 4px; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            background: #fdfdfd;
        }
        input:focus { border-color: var(--ksb-blue); outline: none; box-shadow: 0 0 0 3px rgba(0,82,155,0.1); }

        .results {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid var(--ksb-blue);
        }
        .result-item { margin-bottom: 12px; }
        .result-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 2px; }
        .result-value { font-size: 16px; font-weight: 700; }
        .derivation { font-size: 10px; color: #999; font-style: italic; display: block; }

        /* Preview Area */
        .preview-pane {
            flex: 1;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            padding: 30px;
            min-height: 500px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--bg-gray);
            padding-bottom: 10px;
        }
        .tab {
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .tab.active {
            background: var(--ksb-blue);
            color: white;
        }

        .view-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .view-section {
            display: none;
            width: 100%;
            height: 100%;
        }
        .view-section.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 3D Box Styles */
        .scene {
            width: 100%;
            height: 100%;
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cube {
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-25deg) rotateY(45deg);
            transition: transform 0.1s;
            width: 0;
            height: 0;
        }
        .face {
            position: absolute;
            background: #d2b48c;
            border: 1px solid rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.1);
            backface-visibility: visible;
        }
        .face img {
            display: block;
        }
        /* Verschiedene Brauntöne für plastische Wirkung */
        .face-front  { background: #e3cbb3; }
        .face-back   { background: #d2b48c; }
        .face-right  { background: #c5a783; }
        .face-left   { background: #c5a783; }
        .face-top    { background: #eddbc7; }
        .face-bottom { background: #b89a74; }

        .surfaces-container {
            display: flex;
            gap: 60px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin: auto;
        }

        .surface-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .surface-title { font-size: 12px; font-weight: 700; color: var(--ksb-blue); background: #eef4f9; padding: 4px 12px; border-radius: 20px; }

        .surface {
            background: #d2b48c;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
        }

        .logo-sizes-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .size-chip {
            padding: 4px 10px;
            background: #eee;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
            transition: all 0.2s;
            cursor: pointer;
            user-select: none;
            border: 2px solid transparent;
        }
        .size-chip:hover { background: #e0e0e0; }
        .size-chip.active {
            background: var(--ksb-blue);
            color: white;
            font-weight: bold;
            transform: scale(1.1);
        }
        .size-chip.auto-chip { font-style: italic; }

        .logo-img { display: block; max-width: none; height: auto; }
        .logo3d { height: auto; }

        /* Dimensions */
        .dim { 
            position: absolute; 
            font-size: 11px; 
            color: #666; 
            font-family: monospace; 
            opacity: 0; 
            transition: opacity 0.2s ease-in-out;
            pointer-events: none;
        }
        .surface:hover .dim { opacity: 1; }
        .dim-w { bottom: -22px; width: 100%; text-align: center; border-top: 1px solid #ccc; padding-top: 4px; }
        .dim-h { right: -50px; height: 100%; display: flex; align-items: center; border-left: 1px solid #ccc; padding-left: 8px; }

        @media (min-width: 1000px) {
            .main-layout { flex-direction: row; align-items: stretch; height: calc(100vh - 40px); }
            .sidebar { width: 380px; flex-shrink: 0; }
            .preview-pane { height: 100%; }
        }

        @media (max-width: 600px) {
            .preview-pane { padding: 20px; }
            .surfaces-container { gap: 80px; }
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <!-- Eingabe -->
        <div class="sidebar">
            <h1>Logo Rechner</h1>
            
            <div class="section-hint">
                <span>Maße in mm (L ≥ B)</span>
                <span id="swap-msg" class="swap-note">Werte getauscht!</span>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>Länge (L)</label>
                    <input type="number" id="in-l" value="400" oninput="draw()" onchange="checkSwap()">
                </div>
                <div class="input-group">
                    <label>Breite (B)</label>
                    <input type="number" id="in-b" value="300" oninput="draw()" onchange="checkSwap()">
                </div>
                <div class="input-group">
                    <label>Höhe (H)</label>
                    <input type="number" id="in-h" value="250" oninput="draw()">
                </div>
            </div>

            <div class="results">
                <div class="result-item">
                    <div class="result-label">Ausgewählte Logo-Breite</div>
                    <div class="result-value" id="res-logo-w">0 mm</div>
                    <span class="derivation" id="res-logo-der"></span>
                </div>
                
                <div class="result-item" style="margin-top: 20px;">
                    <div class="result-label">Verfügbare Größen (Klickbar)</div>
                    <div id="size-list" class="logo-sizes-list"></div>
                </div>
            </div>
        </div>

        <!-- Vorschau -->
        <div class="preview-pane">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('2d')">2D Blueprint</div>
                <div class="tab" onclick="switchTab('3d')">3D Vorschau</div>
            </div>
            
            <div class="view-content">
                <!-- 2D View -->
                <div id="view-2d" class="view-section active">
                    <div class="surfaces-container">
                        <div class="surface-box">
                            <div class="surface-title">Seite B x H</div>
                            <div class="surface" id="surf-bh">
                                <img src="ksb-logo-white.svg" id="logo1" class="logo-img">
                                <div class="dim dim-w" id="dim-bh-w">0 mm</div>
                                <div class="dim dim-h" id="dim-bh-h">0 mm</div>
                            </div>
                        </div>
                        <div class="surface-box">
                            <div class="surface-title">Seite L x H</div>
                            <div class="surface" id="surf-lh">
                                <img src="ksb-logo-white.svg" id="logo2" class="logo-img">
                                <div class="dim dim-w" id="dim-lh-w">0 mm</div>
                                <div class="dim dim-h" id="dim-lh-h">0 mm</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 3D View -->
                <div id="view-3d" class="view-section">
                    <div class="scene">
                        <div class="cube" id="cube">
                            <div class="face face-front"><img src="ksb-logo-white.svg" class="logo3d"></div>
                            <div class="face face-back"><img src="ksb-logo-white.svg" class="logo3d"></div>
                            <div class="face face-right"><img src="ksb-logo-white.svg" class="logo3d"></div>
                            <div class="face face-left"><img src="ksb-logo-white.svg" class="logo3d"></div>
                            <div class="face face-top"></div>
                            <div class="face face-bottom"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = '2d';
        let manualSelection = 'auto';
        const LOGO_SIZES = [26, 37, 52, 74, 105, 210, 248, 250, 297, 385, 420, 594, 841, 1189].sort((a, b) => a - b);

        function initDropdown() {
            const list = document.getElementById('size-list');
            
            // Auto Chip
            const autoChip = document.createElement('div');
            autoChip.className = 'size-chip auto-chip';
            autoChip.id = 'chip-auto';
            autoChip.innerText = "Auto";
            autoChip.onclick = () => selectSize('auto');
            list.appendChild(autoChip);

            LOGO_SIZES.forEach(size => {
                const chip = document.createElement('div');
                chip.className = 'size-chip';
                chip.id = 'chip-' + size;
                chip.innerText = size + " mm";
                chip.onclick = () => selectSize(size);
                list.appendChild(chip);
            });
        }

        function selectSize(size) {
            manualSelection = size;
            draw();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById('view-' + tab).classList.add('active');
            draw();
        }

        function checkSwap() {
            const elL = document.getElementById('in-l');
            const elB = document.getElementById('in-b');
            const L = parseFloat(elL.value) || 0;
            const B = parseFloat(elB.value) || 0;
            
            if (B > L && L > 0) {
                elL.value = B;
                elB.value = L;
                draw();
            }
        }

        function draw() {
            let L = parseFloat(document.getElementById('in-l').value) || 0;
            let B = parseFloat(document.getElementById('in-b').value) || 0;
            const H = parseFloat(document.getElementById('in-h').value) || 0;

            // UX: Zeige Hinweis wenn B > L, und rechne intern mit L als dem größeren Wert
            const swapMsg = document.getElementById('swap-msg');
            if (B > L && L > 0) {
                swapMsg.style.display = 'inline';
                const temp = L;
                L = B;
                B = temp;
            } else {
                swapMsg.style.display = 'none';
            }

            if (L <= 0 || B <= 0 || H <= 0) return;

            const surfaceRef = Math.min(B, H);
            let logoW;
            let derivationText = "";

            if (manualSelection !== 'auto') {
                logoW = manualSelection;
                derivationText = `Manuelle Auswahl: ${logoW} mm`;
            } else {
                // Automatische Logik (Maximalabstand 23%)
                const minRequiredW = surfaceRef / 1.46;
                logoW = LOGO_SIZES[LOGO_SIZES.length - 1]; // Fallback
                for (let s of LOGO_SIZES) {
                    if (s >= minRequiredW && s <= surfaceRef) {
                        logoW = s;
                        break;
                    }
                }
                const margin = (surfaceRef - logoW) / 2;
                const marginPercent = (margin / logoW) * 100;
                derivationText = `Herleitung: Min-Breite = ${surfaceRef}mm / 1,46 = ${minRequiredW.toLocaleString('de-DE', {maximumFractionDigits: 1})}mm. Gewählt: ${logoW}mm (Abstand: ${margin.toLocaleString('de-DE', {maximumFractionDigits: 1})}mm ≈ ${marginPercent.toLocaleString('de-DE', {maximumFractionDigits: 1})}% der Logobreite)`;
            }

            // Hilfsfunktion für deutsche Formatierung
            const formatDe = (num, maxDigits = 0) => num.toLocaleString('de-DE', { 
                minimumFractionDigits: 0, 
                maximumFractionDigits: maxDigits 
            });

            // Texte updaten
            document.getElementById('res-logo-w').innerText = formatDe(logoW) + " mm";
            document.getElementById('res-logo-der').innerText = derivationText;

            // Chips hervorheben
            document.querySelectorAll('.size-chip').forEach(c => {
                c.classList.remove('active');
                c.style.borderColor = "transparent";
            });

            if (manualSelection === 'auto') {
                document.getElementById('chip-auto').classList.add('active');
                const calcChip = document.getElementById('chip-' + logoW);
                if (calcChip) calcChip.style.borderColor = "var(--ksb-blue)";
            } else {
                const activeChip = document.getElementById('chip-' + manualSelection);
                if (activeChip) activeChip.classList.add('active');
            }

            // 2D Logic
            if (currentTab === '2d') {
                document.getElementById('dim-bh-w').innerText = formatDe(B) + " mm";
                document.getElementById('dim-bh-h').innerText = formatDe(H) + " mm";
                document.getElementById('dim-lh-w').innerText = formatDe(L) + " mm";
                document.getElementById('dim-lh-h').innerText = formatDe(H) + " mm";

                const pane = document.querySelector('.preview-pane');
                const availW = pane.clientWidth - 100;
                const availH = pane.clientHeight - 150;
                const ratio = Math.min(availW / (B + L + 60), availH / H);

                const sBH = document.getElementById('surf-bh');
                const sLH = document.getElementById('surf-lh');
                sBH.style.width = (B * ratio) + 'px';
                sBH.style.height = (H * ratio) + 'px';
                sLH.style.width = (L * ratio) + 'px';
                sLH.style.height = (H * ratio) + 'px';

                const visualLogoW = logoW * ratio;
                document.getElementById('logo1').style.width = visualLogoW + 'px';
                document.getElementById('logo2').style.width = visualLogoW + 'px';
                sLH.style.borderColor = (logoW > L) ? "#d93025" : "#333";
            }

            // 3D Logic
            if (currentTab === '3d') {
                const cube = document.getElementById('cube');
                
                // Scale factors for 3D (to fit 300px scene)
                const maxDim = Math.max(L, B, H);
                const scale = 250 / maxDim;
                
                const w = L * scale;
                const h = H * scale;
                const d = B * scale;

                const fFront = cube.querySelector('.face-front');
                const fBack = cube.querySelector('.face-back');
                const fRight = cube.querySelector('.face-right');
                const fLeft = cube.querySelector('.face-left');
                const fTop = cube.querySelector('.face-top');
                const fBottom = cube.querySelector('.face-bottom');

                // Hilfsfunktion zum Setzen von Maßen und Position
                const setFace = (face, width, height, transform) => {
                    face.style.width = width + 'px';
                    face.style.height = height + 'px';
                    face.style.left = (-width / 2) + 'px';
                    face.style.top = (-height / 2) + 'px';
                    face.style.transform = transform;
                };

                setFace(fFront, w, h, `rotateY(0deg) translateZ(${d/2}px)`);
                setFace(fBack, w, h, `rotateY(180deg) translateZ(${d/2}px)`);
                setFace(fRight, d, h, `rotateY(90deg) translateZ(${w/2}px)`);
                setFace(fLeft, d, h, `rotateY(-90deg) translateZ(${w/2}px)`);
                setFace(fTop, w, d, `rotateX(90deg) translateZ(${h/2}px)`);
                setFace(fBottom, w, d, `rotateX(-90deg) translateZ(${h/2}px)`);

                // Logo in 3D
                const logo3d = cube.querySelectorAll('.logo3d');
                const visualLogo3DW = logoW * scale;
                logo3d.forEach(img => {
                    img.style.width = visualLogo3DW + 'px';
                });
            }
        }

        window.onload = () => {
            initDropdown();
            draw();
        };
        window.onresize = draw;
    </script>
</body>
</html>
